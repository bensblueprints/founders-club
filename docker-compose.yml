services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: founders_club
      POSTGRES_USER: founders
      POSTGRES_PASSWORD: founders
    ports:
      - "55432:5432"
    volumes:
      - founders_club_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U founders -d founders_club"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  founders_club_pgdata:
