<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events | Founders Vietnam</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Bebas+Neue&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="members.css">
    <link rel="stylesheet" href="events.css">
</head>
<body>
    <div class="noise"></div>

    <!-- Navigation -->
    <nav class="nav">
        <a href="index.html" class="nav-logo">
            <span class="logo-text">FOUNDERS</span>
            <span class="logo-accent">VIETNAM</span>
        </a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="events.html" class="active">Events</a>
            <a href="members.html">Members</a>
            <a href="sponsor.html">Sponsor</a>
            <a href="speak.html">Speak</a>
            <a href="login.html" class="nav-login" id="navLogin">Login</a>
            <a href="#" class="nav-profile" id="navProfile" style="display: none;">
                <span class="profile-avatar" id="navAvatar">JD</span>
            </a>
        </div>
    </nav>

    <main class="events-main">
        <div class="events-header">
            <h1>Upcoming Events</h1>
            <p class="events-subtitle">Exclusive gatherings for Vietnam's most ambitious founders</p>
        </div>

        <!-- Upcoming Events Grid -->
        <div class="events-grid" id="upcomingEventsGrid">
            <!-- Populated by JS -->
        </div>
    </main>

    <!-- Booking Modal -->
    <div class="modal" id="bookingModal">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h2 id="bookingEventName">Book Event</h2>
                <button class="close-modal" onclick="closeBookingModal()">&times;</button>
            </div>
            <div class="booking-content">
                <div class="event-details-section">
                    <div class="event-meta">
                        <span class="event-date" id="bookingEventDate"></span>
                        <span class="event-location" id="bookingEventLocation"></span>
                    </div>
                    <p class="event-description" id="bookingEventDescription"></p>
                </div>

                <div class="tickets-section">
                    <h3>Select Ticket</h3>
                    <div class="tickets-list" id="ticketsList">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <div class="booking-summary" id="bookingSummary" style="display: none;">
                    <h3>Booking Summary</h3>
                    <div class="summary-row">
                        <span>Ticket:</span>
                        <span id="summaryTicketName"></span>
                    </div>
                    <div class="summary-row total">
                        <span>Total:</span>
                        <span id="summaryTotal"></span>
                    </div>
                </div>

                <div class="booking-actions">
                    <button class="btn-secondary" onclick="closeBookingModal()">Cancel</button>
                    <button class="btn-primary" id="proceedToPayment" onclick="proceedToPayment()" disabled>
                        Proceed to Payment
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Payment Modal -->
    <div class="modal" id="paymentModal">
        <div class="modal-content" style="max-width: 500px;">
            <div class="modal-header">
                <h2>Complete Payment</h2>
                <button class="close-modal" onclick="closePaymentModal()">&times;</button>
            </div>
            <div class="payment-content" style="padding: 24px;">
                <!-- Order Summary -->
                <div style="background: rgba(201, 162, 39, 0.08); border: 1px solid rgba(201, 162, 39, 0.3); border-radius: 12px; padding: 20px; margin-bottom: 24px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                        <div>
                            <p id="paymentEventName" style="color: white; font-weight: 500; margin: 0;">Event</p>
                            <p id="paymentTicketName" style="color: rgba(255,255,255,0.6); font-size: 0.85rem; margin: 4px 0 0 0;">Ticket Type</p>
                        </div>
                        <span id="paymentAmount" style="color: #c9a227; font-size: 1.5rem; font-weight: 600;">$0</span>
                    </div>
                </div>

                <!-- Card Payment Form -->
                <div style="background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 20px;">
                    <h4 style="color: white; font-family: 'Outfit', sans-serif; font-size: 1rem; margin-bottom: 16px; display: flex; align-items: center; gap: 10px;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#c9a227" stroke-width="2">
                            <rect x="1" y="4" width="22" height="16" rx="2" ry="2"/>
                            <line x1="1" y1="10" x2="23" y2="10"/>
                        </svg>
                        Card Details
                    </h4>

                    <div style="margin-bottom: 14px;">
                        <label style="display: block; color: rgba(255,255,255,0.7); font-size: 0.85rem; margin-bottom: 6px;">Cardholder Name</label>
                        <input type="text" id="evtCardholderName" placeholder="Name on card" style="width: 100%; padding: 12px 14px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: white; font-size: 1rem; outline: none;">
                    </div>

                    <div style="margin-bottom: 14px;">
                        <label style="display: block; color: rgba(255,255,255,0.7); font-size: 0.85rem; margin-bottom: 6px;">Card Number</label>
                        <input type="text" id="evtCardNumber" placeholder="1234 5678 9012 3456" maxlength="19" style="width: 100%; padding: 12px 14px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: white; font-size: 1rem; outline: none; letter-spacing: 2px;">
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 14px;">
                        <div>
                            <label style="display: block; color: rgba(255,255,255,0.7); font-size: 0.85rem; margin-bottom: 6px;">Expiry Date</label>
                            <input type="text" id="evtCardExpiry" placeholder="MM/YY" maxlength="5" style="width: 100%; padding: 12px 14px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: white; font-size: 1rem; outline: none;">
                        </div>
                        <div>
                            <label style="display: block; color: rgba(255,255,255,0.7); font-size: 0.85rem; margin-bottom: 6px;">CVC</label>
                            <input type="text" id="evtCardCvc" placeholder="123" maxlength="4" style="width: 100%; padding: 12px 14px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: white; font-size: 1rem; outline: none;">
                        </div>
                    </div>
                </div>

                <!-- Pay Button -->
                <button type="button" id="confirmPayment" onclick="confirmPayment()" style="width: 100%; margin-top: 20px; padding: 16px; background: linear-gradient(135deg, #c9a227, #e5c464); color: #1a1a1a; font-family: 'Outfit', sans-serif; font-size: 1.1rem; font-weight: 600; border: none; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;">
                    <span id="paymentBtnText">Pay Now</span>
                    <span id="paymentSpinner" style="display: none;">
                        <svg width="20" height="20" viewBox="0 0 24 24" style="animation: spin 1s linear infinite;">
                            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" fill="none" stroke-dasharray="30 70"/>
                        </svg>
                        Processing...
                    </span>
                </button>

                <!-- Security Note -->
                <div style="display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 14px; color: rgba(255,255,255,0.5); font-size: 0.8rem;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    <span>Secured by Airwallex • 256-bit encryption</span>
                </div>

                <!-- Cancel Link -->
                <button type="button" onclick="closePaymentModal()" style="width: 100%; margin-top: 12px; padding: 12px; background: transparent; color: rgba(255,255,255,0.6); font-family: 'Outfit', sans-serif; font-size: 0.9rem; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; cursor: pointer;">
                    Cancel
                </button>
            </div>
        </div>
    </div>

    <style>
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="database.js"></script>
    <script src="auth.js"></script>
    <script src="events-data.js"></script>
    <script>
        let selectedEvent = null;
        let selectedTicket = null;

        document.addEventListener('DOMContentLoaded', () => {
            initEventsPage();
        });

        function initEventsPage() {
            // Update nav
            if (Auth.isLoggedIn()) {
                const user = Auth.getCurrentUser();
                document.getElementById('navLogin').style.display = 'none';
                document.getElementById('navProfile').style.display = 'flex';
                document.getElementById('navProfile').href = 'profile.html';
                document.getElementById('navAvatar').textContent = user.firstName[0] + user.lastName[0];

                // Show admin link for admin users
                const adminRoles = ['owner', 'admin', 'organiser'];
                if (adminRoles.includes(user.memberType)) {
                    const navLinks = document.querySelector('.nav-links');
                    const adminLink = document.createElement('a');
                    adminLink.href = 'admin.html';
                    adminLink.textContent = 'Admin';
                    navLinks.insertBefore(adminLink, document.getElementById('navLogin'));
                }
            }

            // Load events
            loadUpcomingEvents();
        }

        function loadUpcomingEvents() {
            const events = Events.getUpcomingEvents();
            const grid = document.getElementById('upcomingEventsGrid');

            if (events.length === 0) {
                grid.innerHTML = `
                    <div class="no-events">
                        <h3>No upcoming events</h3>
                        <p>Check back soon for new events!</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = events.map(event => {
                // Get speaker profile photos from members list
                const members = Auth.getMembers ? Auth.getMembers() : [];
                const getSpeakerPhoto = (speakerName) => {
                    const member = members.find(m =>
                        m.firstName?.toLowerCase() === speakerName.toLowerCase() ||
                        `${m.firstName} ${m.lastName}`.toLowerCase().includes(speakerName.toLowerCase())
                    );
                    return member?.profilePhoto || member?.avatar || null;
                };

                const getSpeakerInitials = (name) => {
                    const parts = name.split(' ');
                    return parts.length > 1 ? parts[0][0] + parts[1][0] : name.substring(0, 2);
                };

                const speakersHtml = event.speakers && event.speakers.length > 0 ? `
                    <div class="event-speakers" style="margin: 15px 0; padding: 15px; background: rgba(201, 162, 39, 0.08); border-radius: 8px; border: 1px solid rgba(201, 162, 39, 0.2);">
                        <h4 style="color: #c9a227; font-size: 0.85rem; font-family: 'Outfit', sans-serif; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.05em;">Featured Speakers</h4>
                        <div style="display: flex; flex-direction: column; gap: 10px;">
                            ${event.speakers.map(speaker => {
                                const photo = speaker.pullProfilePhoto ? getSpeakerPhoto(speaker.name) : null;
                                return `
                                <div style="display: flex; align-items: center; gap: 12px;">
                                    ${photo ?
                                        `<img src="${photo}" alt="${speaker.name}" style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(201, 162, 39, 0.5);">` :
                                        `<div style="width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #c9a227, #b8922a); display: flex; align-items: center; justify-content: center; color: #1a1a1a; font-weight: 600; font-size: 0.85rem;">${getSpeakerInitials(speaker.name)}</div>`
                                    }
                                    <div style="flex: 1;">
                                        <div style="display: flex; align-items: center; gap: 8px;">
                                            <span style="color: white; font-weight: 500;">${speaker.name}</span>
                                            ${speaker.badge ? `<span style="background: linear-gradient(135deg, #c9a227, #e5c464); color: #1a1a1a; font-size: 0.65rem; padding: 2px 8px; border-radius: 10px; font-weight: 600;">${speaker.badge}</span>` : ''}
                                        </div>
                                        <span style="color: rgba(255,255,255,0.6); font-size: 0.85rem;">${speaker.topic}</span>
                                    </div>
                                </div>
                            `}).join('')}
                        </div>
                    </div>
                ` : '';

                const capacityHtml = `
                    <div class="event-capacity" style="display: flex; gap: 15px; margin: 10px 0; padding: 10px 0; border-top: 1px solid rgba(255,255,255,0.1);">
                        <div style="text-align: center; flex: 1;">
                            <div style="color: #c9a227; font-size: 1.3rem; font-weight: 600;">${event.dinnerSpotsRemaining || event.spotsRemaining}/${event.dinnerCapacity || event.capacity}</div>
                            <div style="color: rgba(255,255,255,0.5); font-size: 0.75rem;">Dinner Tickets</div>
                        </div>
                        <div style="width: 1px; background: rgba(255,255,255,0.1);"></div>
                        <div style="text-align: center; flex: 1;">
                            <div style="color: #c9a227; font-size: 1.3rem; font-weight: 600;">${event.cruiseSpotsRemaining}/${event.cruiseCapacity}</div>
                            <div style="color: rgba(255,255,255,0.5); font-size: 0.75rem;">Cruise Tickets</div>
                        </div>
                    </div>
                `;

                return `
                <div class="event-card ${event.isPlatinumEvent ? 'platinum-event' : ''}">
                    ${event.isPlatinumEvent ? '<div class="platinum-badge">Platinum Event</div>' : ''}
                    <div class="event-card-header">
                        <span class="event-type">${event.type}</span>
                        <span class="event-spots ${event.spotsRemaining < 10 ? 'low' : ''}">${event.spotsRemaining} spots left</span>
                    </div>
                    <h3 class="event-card-title">${event.name}</h3>
                    <div class="event-card-meta">
                        <div class="meta-item">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                                <line x1="16" y1="2" x2="16" y2="6"/>
                                <line x1="8" y1="2" x2="8" y2="6"/>
                                <line x1="3" y1="10" x2="21" y2="10"/>
                            </svg>
                            <span>${event.displayDate}</span>
                        </div>
                        <div class="meta-item">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"/>
                                <polyline points="12 6 12 12 16 14"/>
                            </svg>
                            <span>${event.time}</span>
                        </div>
                        <div class="meta-item">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                                <circle cx="12" cy="10" r="3"/>
                            </svg>
                            <span>${event.location}</span>
                        </div>
                    </div>
                    ${speakersHtml}
                    ${capacityHtml}
                    <p class="event-card-description">${event.description.substring(0, 150)}${event.description.length > 150 ? '...' : ''}</p>
                    <div class="event-card-footer">
                        <span class="event-price">From $${Math.min(...event.tickets.map(t => t.price))}</span>
                        <button class="book-btn" onclick="openBookingModal('${event.id}')" ${event.status !== 'open' ? 'disabled' : ''}>
                            ${event.status === 'open' ? 'Book Now' : event.status === 'soldout' ? 'Sold Out' : 'Closed'}
                        </button>
                    </div>
                </div>
            `}).join('');
        }

        function openBookingModal(eventId) {
            if (!Auth.isLoggedIn()) {
                alert('Please log in to book events.');
                window.location.href = 'login.html';
                return;
            }

            const user = Auth.getCurrentUser();
            if (Events.hasUserBookedEvent(user.id, eventId)) {
                alert('You have already booked this event!');
                return;
            }

            selectedEvent = Events.getUpcomingEventById(eventId);
            if (!selectedEvent) return;

            document.getElementById('bookingEventName').textContent = selectedEvent.name;
            document.getElementById('bookingEventDate').textContent = `${selectedEvent.displayDate} • ${selectedEvent.time}`;
            document.getElementById('bookingEventLocation').textContent = selectedEvent.location;
            document.getElementById('bookingEventDescription').textContent = selectedEvent.description;

            // Render tickets
            const ticketsList = document.getElementById('ticketsList');
            ticketsList.innerHTML = selectedEvent.tickets.map(ticket => `
                <div class="ticket-option" data-ticket-id="${ticket.id}" onclick="selectTicket('${ticket.id}')">
                    <div class="ticket-header">
                        <span class="ticket-name">${ticket.name}</span>
                        <span class="ticket-price">$${ticket.price} ${ticket.currency}</span>
                    </div>
                    <p class="ticket-description">${ticket.description}</p>
                    <ul class="ticket-perks">
                        ${ticket.perks.map(perk => `<li>${perk}</li>`).join('')}
                    </ul>
                </div>
            `).join('');

            selectedTicket = null;
            document.getElementById('bookingSummary').style.display = 'none';
            document.getElementById('proceedToPayment').disabled = true;

            document.getElementById('bookingModal').classList.add('active');
        }

        function selectTicket(ticketId) {
            selectedTicket = selectedEvent.tickets.find(t => t.id === ticketId);
            if (!selectedTicket) return;

            // Update UI
            document.querySelectorAll('.ticket-option').forEach(el => el.classList.remove('selected'));
            document.querySelector(`[data-ticket-id="${ticketId}"]`).classList.add('selected');

            // Show summary
            document.getElementById('summaryTicketName').textContent = selectedTicket.name;
            document.getElementById('summaryTotal').textContent = `$${selectedTicket.price} ${selectedTicket.currency}`;
            document.getElementById('bookingSummary').style.display = 'block';
            document.getElementById('proceedToPayment').disabled = false;
        }

        function closeBookingModal() {
            document.getElementById('bookingModal').classList.remove('active');
            selectedEvent = null;
            selectedTicket = null;
        }

        function proceedToPayment() {
            if (!selectedEvent || !selectedTicket) return;

            const user = Auth.getCurrentUser();

            // Update payment modal with event and ticket info
            document.getElementById('paymentEventName').textContent = selectedEvent.name;
            document.getElementById('paymentTicketName').textContent = selectedTicket.name;
            document.getElementById('paymentAmount').textContent = `$${selectedTicket.price}`;

            // Pre-fill cardholder name
            document.getElementById('evtCardholderName').value = `${user.firstName} ${user.lastName}`;

            // Clear other fields
            document.getElementById('evtCardNumber').value = '';
            document.getElementById('evtCardExpiry').value = '';
            document.getElementById('evtCardCvc').value = '';

            closeBookingModal();
            document.getElementById('paymentModal').classList.add('active');

            // Setup card input formatting
            setupCardInputFormatting();
        }

        function setupCardInputFormatting() {
            const cardNumber = document.getElementById('evtCardNumber');
            const cardExpiry = document.getElementById('evtCardExpiry');
            const cardCvc = document.getElementById('evtCardCvc');

            cardNumber.addEventListener('input', function(e) {
                let value = e.target.value.replace(/\s/g, '').replace(/\D/g, '');
                let formatted = value.match(/.{1,4}/g)?.join(' ') || value;
                e.target.value = formatted;
            });

            cardExpiry.addEventListener('input', function(e) {
                let value = e.target.value.replace(/\D/g, '');
                if (value.length >= 2) {
                    value = value.substring(0, 2) + '/' + value.substring(2, 4);
                }
                e.target.value = value;
            });

            cardCvc.addEventListener('input', function(e) {
                e.target.value = e.target.value.replace(/\D/g, '');
            });
        }

        function closePaymentModal() {
            document.getElementById('paymentModal').classList.remove('active');
        }

        async function confirmPayment() {
            if (!selectedEvent || !selectedTicket) return;

            const user = Auth.getCurrentUser();
            const btn = document.getElementById('confirmPayment');
            const btnText = document.getElementById('paymentBtnText');
            const spinner = document.getElementById('paymentSpinner');

            // Validate card fields
            const cardNumber = document.getElementById('evtCardNumber').value.replace(/\s/g, '');
            const cardExpiry = document.getElementById('evtCardExpiry').value;
            const cardCvc = document.getElementById('evtCardCvc').value;
            const cardholderName = document.getElementById('evtCardholderName').value;

            if (!cardholderName || cardholderName.length < 2) {
                alert('Please enter the cardholder name');
                return;
            }
            if (!cardNumber || cardNumber.length < 15) {
                alert('Please enter a valid card number');
                return;
            }
            if (!cardExpiry || cardExpiry.length < 5) {
                alert('Please enter a valid expiry date (MM/YY)');
                return;
            }
            if (!cardCvc || cardCvc.length < 3) {
                alert('Please enter a valid CVC');
                return;
            }

            btn.disabled = true;
            btnText.style.display = 'none';
            spinner.style.display = 'flex';

            try {
                // Store pending booking info
                const pendingBooking = {
                    eventId: selectedEvent.id,
                    eventName: selectedEvent.name,
                    ticketId: selectedTicket.id,
                    ticketName: selectedTicket.name,
                    ticketPrice: selectedTicket.price,
                    userId: user.id,
                    userEmail: user.email,
                    userName: `${user.firstName} ${user.lastName}`,
                    createdAt: new Date().toISOString()
                };
                localStorage.setItem('founders_vietnam_pending_booking', JSON.stringify(pendingBooking));

                // Create payment intent
                const paymentResult = await Payment.createPaymentIntent(
                    selectedTicket.price,
                    selectedTicket.currency,
                    `${selectedEvent.name} - ${selectedTicket.name}`,
                    user.email,
                    `${user.firstName} ${user.lastName}`,
                    selectedEvent.id,
                    selectedTicket.id
                );

                if (paymentResult.error && !paymentResult.mock) {
                    throw new Error(paymentResult.error);
                }

                // Process payment (simulated for demo mode)
                await new Promise(resolve => setTimeout(resolve, 2000));

                // Create booking
                const bookingResult = await Events.createBooking(
                    user.id,
                    selectedEvent.id,
                    selectedTicket.id,
                    paymentResult.paymentIntentId || `demo-${Date.now()}`
                );

                if (bookingResult.error) {
                    throw new Error(bookingResult.error);
                }

                // Store booking for ticket page
                const bookingData = {
                    ...bookingResult,
                    eventName: selectedEvent.name,
                    ticketName: selectedTicket.name,
                    cardLast4: cardNumber.slice(-4)
                };
                localStorage.setItem('founders_vietnam_last_booking', JSON.stringify(bookingData));
                localStorage.removeItem('founders_vietnam_pending_booking');

                closePaymentModal();

                // Redirect to ticket page
                window.location.href = `ticket.html?id=${bookingResult.booking.id}`;

            } catch (error) {
                console.error('Payment error:', error);
                alert('Payment processing failed. Please try again.');
            } finally {
                btn.disabled = false;
                btnText.style.display = 'inline';
                spinner.style.display = 'none';
            }
        }
    </script>
</body>
</html>
